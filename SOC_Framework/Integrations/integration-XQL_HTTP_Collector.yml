commonfields:
  id: XQL HTTP Collector
  version: -1
vcShouldKeepItemLegacyProdMachine: false
name: XQL HTTP Collector
display: XQL HTTP Collector
category: Utilities
image: data:image/png;base64,
description: This integration allows for posting data to the XSIAM HTTP collector
  so it can be queried via XQL
detaileddescription: |-
  Used for posted to HTTP data set in XSIAM.

  Correlation rule can then be created to generate alerts based on the data generated from this command.
configuration:
- display: vendor name
  name: vendor
  defaultvalue: XSIAM
  type: 0
  required: false
  additionalinfo: The name of the 'Vendor' to include in the event data
- display: Product Name
  name: product
  defaultvalue: PlaybookMetrics
  type: 0
  required: false
  additionalinfo: The name of the 'Product' to include in the event data
script:
  script: |
    register_module_line('XQLHTTPCollector', 'start', __line__())

    import json


    def test_module_command() -> str:
        """
        A placeholder function to implement testing - doesn't actually do anything (yet).

        Returns:
            (str) 'ok' if success.
        """
        return 'ok'

    def main() -> None:
        """
        main function, parses params and runs command functions
        """

        params = demisto.params()
        args = demisto.args()
        command = demisto.command()

        demisto.log(f'Command being called is {command}')

        try:
            if command == 'test-module':
                return_results(test_module_command())

            elif command == 'xql-post-to-dataset':
                demisto.log(f"Params: {params}")
                demisto.log(f"Args: {args}")
                VENDOR = args.get('vendor') if args.get('vendor') else params.get('vendor')
                PRODUCT = args.get('product)') if args.get('product') else params.get('product')

                events = json.loads(args.get('JSON'))
                events = events if type(events) == list else [events]

                send_events_to_xsiam(
                    events,
                    vendor=VENDOR,
                    product=PRODUCT
                )

        except Exception as e:
            return_error(f'Failed to execute {command} command.\nError:\n{e}')


    ''' ENTRY POINT '''

    if __name__ in ('__main__', '__builtin__', 'builtins'):
        main()

    register_module_line('XQLHTTPCollector', 'end', __line__())
  type: python
  commands:
  - name: xql-post-to-dataset
    arguments:
    - name: JSON
      required: true
      description: The event data to send given in JSON formatted string
  dockerimage: demisto/python3:3.10.9.42476
  runonce: false
  subtype: python3
